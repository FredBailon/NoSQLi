services:
  nosqltool:
    build:
      context: .
      args:
        APP_UID: "10001"
        APP_GID: "10001"
    image: nosqltool:local
    init: true
    stdin_open: true
    tty: true
    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    tmpfs:
      - /var/cache/nosqltool:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=0700,size=64m
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      CACHE_DIR: /var/cache/nosqltool/payloads
      REPORT_HOST: 0.0.0.0
      REPORT_PORT: "8000"
    volumes:
      - type: bind
        source: ${SWAGGER_PATH:?Defina SWAGGER_PATH con la ruta del swagger.json}
        target: /tmp/swagger/swagger.json
        read_only: true
        bind:
          create_host_path: false
    command: ["python", "-m", "NoSQLTool.cli"]
